<div class="min-h-screen bg-gray-100">
  <!-- Navbar -->
  <nav class="bg-white shadow-lg">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-gray-600">Meu Perfil</h1>
      <button
        (click)="goBack()"
        class="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition cursor-pointer"
      >
        Voltar
      </button>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="max-w-2xl mx-auto px-4 py-12">
    <div class="bg-white rounded-lg shadow-lg p-8 w-full min-h-96">
      <!-- Informações do usuário -->
      <div class="mb-8 flex flex-col items-center gap-5">
        <h2 class="text-xl font-semibold text-gray-800 mb-4">Informações do Usuário</h2>
        <div class="flex flex-col gap-5 w-full">
          <div>
            <p class="text-sm text-gray-600">Nome</p>
            <p class="text-lg font-semibold text-gray-800">{{ currentUser?.name }}</p>
          </div>
          <div>
            <p class="text-sm text-gray-600">Email</p>
            <p class="text-lg font-semibold text-gray-800">{{ currentUser?.email }}</p>
          </div>
        </div>
      </div>

      <hr class="my-8" />

      <!-- Foto do perfil -->
      <div class="flex flex-col items-center mb-8 text-center">
        <h2 class="text-xl font-semibold text-gray-800 mb-4">Foto do Perfil</h2>

        <!-- Foto atual -->
        <div class="mb-6">
          <img
            [src]="currentUser?.profileImage || 'assets/default-avatar.png'"
            alt="Foto do perfil"
            class="w-32 h-32 rounded-full object-cover border-2 border-gray-300"
          />
        </div>

        <!-- Input para nova foto -->
        <div class="mb-4">
          <label class="block text-sm font-semibold text-gray-700 mb-2">
            Selecione uma nova foto
          </label>
          <input
            type="file"
            accept="image/*"
            (change)="onFileSelected($event)"
            class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-600 hover:file:bg-blue-100"
          />
          <p class="text-xs text-gray-500 mt-2">Máximo 5MB. Formatos: JPG, PNG, GIF</p>
        </div>

        <!-- Prévia -->
         @if (previewUrl){
        <div class="mb-6">
          <p class="text-sm font-semibold text-gray-700 mb-2">Prévia</p>
          <img
            [src]="previewUrl"
            alt="Prévia"
            class="w-32 h-32 rounded-full object-cover border-2 border-blue-300"
          />
        </div>
        }
        <!-- Botão salvar -->
        <button
          (click)="saveProfileImage()"
          [disabled]="!selectedFile || isLoading"
          class="px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition disabled:bg-gray-400 disabled:cursor-not-allowed"
        >
          {{ isLoading ? 'Salvando...' : 'Salvar Foto' }}
        </button>
      </div>
    </div>
  </div>
</div>
