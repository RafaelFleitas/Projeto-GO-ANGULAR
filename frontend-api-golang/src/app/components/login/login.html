<div class="min-h-screen bg-linear-to-br from-black to-gray-950 flex items-center justify-center p-4" >
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-lg">
        <h1 class="text-3xl font-bold text-center text-gray-600 mb-8">Login de Usuários</h1>

        <form (ngSubmit)="onLogin()" action="submit" class="space-y-6">
            <div>
                <label for="email" class="block text-gray-700 text-md font-medium">Email</label>
                <input 
                type="email" id="email" name="email" [(ngModel)]="email" 
                placeholder="Digite seu Email" required 
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-600 focus:border-transparent transition">
            </div>



            <div>
                <label for="password" class="block text-gray-700 text-md font-medium">Senha</label>
                <input
                type="password" id="password" name="password" [(ngModel)]="password" 
                placeholder="Digite sua Senha" required 
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-600 focus:border-transparent transition"
                >
            </div>

            <div>
                @if (errorMessage) {
                    <p class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm">{{ errorMessage }}</p>
                }
            </div>

            <button type="submit" [disabled]="isLoading()" class="w-full bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded-lg transition">
                {{isLoading() ? 'Carregando...' : 'Entrar'}}
            </button>
        </form>

    </div>

</div>
