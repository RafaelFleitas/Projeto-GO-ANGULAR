<div class="fixed bottom-5 right-5 z-50 flex flex-col gap-3 pointer-events-none">
  @for (notification of notificationService.notifications(); track notification.id) {
    <div 
      class="min-w-80 max-w-sm px-4 py-4 rounded-lg shadow-lg animate-in slide-in-from-right-full duration-300 pointer-events-auto"
      [ngClass]="{
        'bg-green-100 border border-green-400 text-green-800': notification.type === 'success',
        'bg-red-100 border border-red-400 text-red-800': notification.type === 'error',
        'bg-blue-100 border border-blue-400 text-blue-800': notification.type === 'info',
        'bg-yellow-100 border border-yellow-400 text-yellow-800': notification.type === 'warning'
      }"
    >
      <div class="flex justify-between items-center gap-3">
        <span class="text-sm font-medium flex-1">{{ notification.message }}</span>
        <button 
          type="button"
          class="text-lg leading-none opacity-70 hover:opacity-100 transition-opacity shrink-0"
          (click)="remove(notification.id)"
          aria-label="Fechar notificação"
        >
          ✕
        </button>
      </div>
    </div>
  }
</div>
